name: Build and publish backend Docker image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./sc_app
          file: ./sc_app/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/oncodetect-api:latest

      - name: Image details
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository_owner }}/oncodetect-api:latest"
